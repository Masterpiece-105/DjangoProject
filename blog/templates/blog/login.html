{% extends 'blog/base.html' %}
{% block title %}Login — inkwell{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 4rem auto;">

  <div style="margin-bottom: 2rem;">
    <p class="tag mb-3">Welcome back</p>
    <h1 class="font-display text-4xl" style="color: var(--text-primary); letter-spacing: -0.03em;">Sign in</h1>
  </div>

  <div style="background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 12px; padding: 2rem;">
    <form method="post">
      {% csrf_token %}

      <div style="margin-bottom: 1.25rem;">
        <label style="display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;">Username</label>
        <input type="text" name="username" required />
      </div>

      <div style="margin-bottom: 1.25rem;">
        <label style="display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;">Password</label>
        <input type="password" name="password" required />
      </div>

      <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-default); display: flex; align-items: center; gap: 12px;">
        <button type="submit" class="btn-primary">Login</button>
        <a href="/register/" class="btn-ghost">Create account</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
